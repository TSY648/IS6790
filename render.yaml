databases:
  - name: supermarket-game-db
    plan: free
    databaseName: supermarket_game
    user: supermarket_game

services:
  - type: web
    name: supermarket-manager-internship
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn supermarket_game.wsgi:application
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: supermarket-game-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.11
