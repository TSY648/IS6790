<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="600" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#111827">Monthly Revenue Growth Trend (Full Scale)</text>

  <line x1="120" y1="610" x2="1030" y2="610" stroke="#111827" stroke-width="2"/>
  <line x1="120" y1="100" x2="120" y2="610" stroke="#111827" stroke-width="2"/>

  <g stroke="#d9dde5" stroke-dasharray="6 6">
    <line x1="120" y1="100" x2="1030" y2="100"/>
    <line x1="120" y1="202" x2="1030" y2="202"/>
    <line x1="120" y1="304" x2="1030" y2="304"/>
    <line x1="120" y1="406" x2="1030" y2="406"/>
    <line x1="120" y1="508" x2="1030" y2="508"/>
    <line x1="120" y1="610" x2="1030" y2="610"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="18" fill="#111827">
    <text x="82" y="616" text-anchor="end">0</text>
    <text x="82" y="514" text-anchor="end">20,000</text>
    <text x="82" y="412" text-anchor="end">40,000</text>
    <text x="82" y="310" text-anchor="end">60,000</text>
    <text x="82" y="208" text-anchor="end">80,000</text>
    <text x="82" y="106" text-anchor="end">100,000</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="22" fill="#111827">
    <text x="120" y="650" text-anchor="middle">Last Month</text>
    <text x="1030" y="650" text-anchor="middle">Current Month</text>
  </g>

  <text x="575" y="690" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#111827">Period</text>
  <text x="18" y="355" transform="rotate(-90 18,355)" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#111827">Revenue ($)</text>

  <line x1="180" y1="192" x2="970" y2="187" stroke="#2878b5" stroke-width="6"/>
  <circle cx="180" cy="192" r="9" fill="#2878b5"/>
  <circle cx="970" cy="187" r="9" fill="#2878b5"/>

  <text x="180" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#111827">82,000</text>
  <text x="970" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#111827">83,000</text>

  <rect x="760" y="86" width="310" height="58" rx="12" fill="#eef5ff" stroke="#bfd3ea"/>
  <text x="915" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1f3d73">Start at $0: the jump is much smaller.</text>
</svg>
