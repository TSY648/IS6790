<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}数据素养游戏{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
        }
        .topbar {
            height: 64px;
            background: #1f2937;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        .container {
            min-height: calc(100vh - 64px);
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            cursor: pointer;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="topbar">
        <div><strong>超市实习经理</strong></div>
        <div>设置 / 帮助</div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
